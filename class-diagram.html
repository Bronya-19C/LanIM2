<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LanIM2 — Class Dependency Diagram</title>
<script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
<style>
:root {
    --bg: #1a1d23;
    --panel-bg: #21252b;
    --border: #333842;
    --text: #cdd6e0;
    --text-dim: #7f848e;
    --accent: #528bff;
    --header-bg: #282c34;
    --hover-bg: #2c313a;
    --field-color: #e5c07b;
    --method-color: #61afef;
    --type-color: #98c379;
    --keyword: #c678dd;
    --external: #5c6370;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', 'SF Mono', 'Cascadia Code', Consolas, monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
#toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
}
#toolbar .title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-right: 12px;
    white-space: nowrap;
}
#searchBox {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 4px;
    width: 220px;
    font-size: 13px;
    outline: none;
}
#searchBox:focus { border-color: var(--accent); }
#searchBox::placeholder { color: var(--text-dim); }
.toolbar-btn {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    transition: background .15s;
}
.toolbar-btn:hover { background: var(--hover-bg); }
.toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#mainContainer {
    display: flex;
    flex: 1;
    overflow: hidden;
}
#graphContainer {
    flex: 1;
    position: relative;
    background: var(--bg);
    min-width: 0;
}
#graph {
    width: 100%;
    height: 100%;
}
#legend {
    position: absolute;
    left: 12px;
    bottom: 12px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 5;
}
#legend .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
}
.legend-color {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
}
.legend-label {
    color: var(--text-dim);
    white-space: nowrap;
}
#sidebar {
    width: 360px;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: width .2s;
}
#sidebar.collapsed { width: 0; }
#sidebarHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
}
#sidebarClose {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 3px;
}
#sidebarClose:hover { color: var(--text); background: var(--hover-bg); }
#sidebarContent {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    font-size: 12px;
}
#sidebarPlaceholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 20px;
}
.sidebar-section { margin-bottom: 16px; }
.sidebar-section h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 6px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
}
.sidebar-class-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.sidebar-fqn { color: var(--text-dim); font-size: 11px; margin-bottom: 6px; word-break: break-all; }
.sidebar-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.sidebar-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(82,139,255,.15);
    color: var(--accent);
    font-weight: 600;
}
.sidebar-badge.extends-badge { background: rgba(198,120,221,.15); color: var(--keyword); }
.sidebar-badge.implements-badge { background: rgba(97,175,239,.15); color: var(--method-color); }
.field-row, .method-row {
    padding: 3px 0;
    border-radius: 2px;
    display: flex;
    align-items: baseline;
}
.method-row .method-sig { color: var(--method-color); }
.field-row .field-name { color: var(--field-color); }
.field-row .field-type { color: var(--text-dim); margin-left: auto; font-size: 11px; }
.method-row .method-ret { color: var(--type-color); margin-left: auto; font-size: 11px; }
.sep { color: var(--text-dim); margin: 0 3px; }
#sidebarContent .empty-hint { color: var(--text-dim); font-style: italic; font-size: 11px; }
.vis-tooltip {
    background: var(--panel-bg) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 4px !important;
    font-size: 12px !important;
    padding: 6px 10px !important;
    white-space: nowrap !important;
}
</style>
</head>
<body>

<div id="toolbar">
    <span class="title">LanIM2 — Dependency Graph</span>
    <input type="text" id="searchBox" placeholder="Search class...">
    <button class="toolbar-btn" onclick="resetView()" title="Reset view">⟲ Reset</button>
    <button class="toolbar-btn" id="btnExtends" onclick="toggleEdgeType('extends')">⤒ extends</button>
    <button class="toolbar-btn" id="btnImplements" onclick="toggleEdgeType('implements')">⤓ implements</button>
    <button class="toolbar-btn" id="btnContains" onclick="toggleEdgeType('contains')">⊃ contains</button>
    <button class="toolbar-btn active" id="btnField" onclick="toggleEdgeType('has-field')">● has-field</button>
</div>

<div id="mainContainer">
    <div id="graphContainer">
        <div id="graph"></div>
        <div id="legend"></div>
    </div>
    <div id="sidebar">
        <div id="sidebarHeader">
            <span>Details</span>
            <button id="sidebarClose" onclick="toggleSidebar()">✕</button>
        </div>
        <div id="sidebarContent">
            <div id="sidebarPlaceholder">Click a node to inspect</div>
        </div>
    </div>
</div>

// ── Edges ────────────────────────────────────────────────────────────────────
function mkEdge(from, to, type, opts) {
    const base = {
        from, to, _type: type,
        smooth: {type:"cubicBezier"},
        font: {size:9, background:"rgba(26,29,35,.85)", strokeWidth:0}
    };
    if (type === "extends") {
        return {...base, ...opts,
            arrows:"to", color:{color:"#E74C3C",opacity:.6}, width:3, dashes:false,
            font:{...base.font, color:"#E74C3C"}, label:"extends"};
    }
    if (type === "implements") {
        return {...base, ...opts,
            arrows:"to", color:{color:"#3498DB",opacity: opts.toExternal ? .4 : .7}, dashes:[8,4], width:2,
            font:{...base.font, color: opts.toExternal ? "#666" : "#3498DB"}, label:"implements"};
    }
    if (type === "contains") {
        return {...base, ...opts,
            arrows:"to", color:{color:"#c678dd",opacity:.8}, dashes:[4,4], width:1.5,
            font:{...base.font, color:"#c678dd"}, label:"contains"};
    }
    return {...base, ...opts,
        arrows:"to", color:{color:"#7f848e"}, width:1.8, dashes:false,
        font:{...base.font, color:"#7f848e"}};
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(nodeId) {
    const meta = META[nodeId];
    if (!meta) {
        document.getElementById("sidebarContent").innerHTML = '<div id="sidebarPlaceholder">No metadata available</div>';
        return;
    }
    const c = PKG_COLORS[meta.pkg] || PKG_COLORS.external;
    let html = `<div class="sidebar-class-name">${nodeId}</div>`;
    html += `<div class="sidebar-fqn">${PKG_LABELS[meta.pkg] || meta.pkg}.${nodeId}</div>`;

    let badges = `<span class="sidebar-badge" style="background:${c.bg}22;color:${c.bg}">${meta.pkg}</span>`;
    badges += `<span class="sidebar-badge">${meta.kind}</span>`;
    if (meta.extends) {
        badges += `<span class="sidebar-badge extends-badge">extends ${meta.extends}</span>`;
    }
    if (meta.implements) {
        meta.implements.forEach(ifc => {
            badges += `<span class="sidebar-badge implements-badge">implements ${ifc}</span>`;
        });
    }
    html += `<div class="sidebar-badges">${badges}</div>`;

    // Fields
    html += `<div class="sidebar-section"><h4>Fields (${meta.fields.length})</h4>`;
    if (meta.kind === "enum") {
        meta.fields.forEach(f => {
            html += `<div class="field-row"><span class="field-name">${f.name}</span></div>`;
        });
    } else if (meta.fields.length === 0) {
        html += `<div class="empty-hint">No fields</div>`;
    } else {
        meta.fields.forEach(f => {
            const acc = f.access || "";
            html += `<div class="field-row"><span class="sep">${acc}</span> <span class="field-name">${f.name}</span><span class="field-type">${f.type || ""}</span></div>`;
        });
    }
    html += `</div>`;

    // Methods
    html += `<div class="sidebar-section"><h4>Methods (${meta.methods.length})</h4>`;
    if (meta.methods.length === 0) {
        html += `<div class="empty-hint">No methods</div>`;
    } else {
        meta.methods.forEach(m => {
            const acc = m.access || "";
            const anno = m.anno ? `<span style="color:var(--keyword)">${m.anno} </span>` : "";
            html += `<div class="method-row"><span class="sep">${acc}</span> ${anno}<span class="method-sig">${m.sig}</span><span class="method-ret">${m.ret || ""}</span></div>`;
        });
    }
    html += `</div>`;

    // Inner types
    if (meta.innerTypes.length > 0) {
        html += `<div class="sidebar-section"><h4>Inner Types (${meta.innerTypes.length})</h4>`;
        meta.innerTypes.forEach(t => {
            html += `<div class="field-row"><span class="field-name">${t}</span></div>`;
        });
        html += `</div>`;
    }

    document.getElementById("sidebarContent").innerHTML = html;
}

network.on("click", function(params) {
    if (params.nodes.length > 0) {
        const nodeId = params.nodes[0];
        renderSidebar(nodeId);
    }
});

network.on("doubleClick", function(params) {
    if (params.nodes.length > 0) {
        network.focus(params.nodes[0], {scale: 1.5, animation: true});
    }
});

// ── Search ───────────────────────────────────────────────────────────────────
const searchBox = document.getElementById("searchBox");
searchBox.addEventListener("input", function() {
    const q = this.value.trim().toLowerCase();
    if (!q) {
        nodes.forEach(n => nodes.update({id: n.id, opacity: 1}));
        edges.forEach(e => edges.update({id: e.id, hidden: false}));
        return;
    }
    const matchedIds = new Set();
    nodes.forEach(n => {
        if (n.id.toLowerCase().includes(q)) {
            matchedIds.add(n.id);
            nodes.update({id: n.id, opacity: 1});
        } else {
            nodes.update({id: n.id, opacity: 0.15});
        }
    });
    edges.forEach(e => {
        const show = matchedIds.has(e.from) || matchedIds.has(e.to);
        edges.update({id: e.id, hidden: !show});
    });
});

// ── Edge Toggle ──────────────────────────────────────────────────────────────
let hiddenTypes = {};
function toggleEdgeType(type) {
    hiddenTypes[type] = !hiddenTypes[type];
    const btn = document.getElementById(
        type === "has-field" ? "btnField" :
        type === "extends" ? "btnExtends" :
        type === "implements" ? "btnImplements" : "btnContains"
    );
    if (hiddenTypes[type]) btn.classList.remove("active");
    else btn.classList.add("active");

    edges.forEach(e => {
        if (e._type === type) edges.update({id: e.id, hidden: hiddenTypes[type]});
    });
}

// ── Sidebar Toggle ───────────────────────────────────────────────────────────
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
}

// ── Reset View ───────────────────────────────────────────────────────────────
function resetView() {
    network.fit({animation: true});
    searchBox.value = "";
    nodes.forEach(n => nodes.update({id: n.id, opacity: 1}));
    edges.forEach(e => edges.update({id: e.id, hidden: !!hiddenTypes[e._type]}));
}

// Initial fit
setTimeout(() => network.fit({animation: false}), 800);
